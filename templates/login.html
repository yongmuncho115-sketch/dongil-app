<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인 - 동일산업</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); padding: 40px; width: 360px; }
.login-title { text-align: center; margin-bottom: 28px; }
.login-title h1 { font-size: 22px; color: #1a3a6b; font-weight: 700; }
.login-title p { font-size: 13px; color: #888; margin-top: 4px; }
label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 5px; }
input[type=text], input[type=password] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 16px; outline: none; }
input:focus { border-color: #1a3a6b; }
.btn-login { width: 100%; padding: 12px; background: #1a3a6b; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-login:hover { background: #15305a; }
.flash { padding: 10px; border-radius: 5px; margin-bottom: 14px; font-size: 13px; background: #fadbd8; color: #922b21; border-left: 3px solid #c0392b; }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-title">
    <h1>🏭 동일산업</h1>
    <p>제조의뢰서 관리 시스템</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="post">
    <label>아이디</label>
    <input type="text" name="username" required autofocus>
    <label>비밀번호</label>
    <input type="password" name="password" required>
    <button type="submit" class="btn-login">로그인</button>
  </form>
</div>
</body>
</html>
