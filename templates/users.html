{% extends 'base.html' %}
{% block content %}
<h5>👤 사용자 관리</h5>
<form method="post" class="row g-2 mb-3">
  <div class="col-auto"><input type="text" name="username" class="form-control form-control-sm" placeholder="아이디" required></div>
  <div class="col-auto"><input type="password" name="password" class="form-control form-control-sm" placeholder="비밀번호" required></div>
  <div class="col-auto"><input type="text" name="name" class="form-control form-control-sm" placeholder="이름" required></div>
  <div class="col-auto">
    <select name="role" class="form-select form-select-sm">
      <option value="user">일반</option>
      <option value="admin">관리자</option>
    </select>
  </div>
  <div class="col-auto"><button class="btn btn-primary btn-sm">추가</button></div>
</form>
<table class="table table-sm bg-white" style="max-width:500px">
  <thead class="table-dark"><tr><th>아이디</th><th>이름</th><th>권한</th><th>삭제</th></tr></thead>
  <tbody>
  {% for u in users %}
  <tr>
    <td>{{ u.username }}</td>
    <td>{{ u.name }}</td>
    <td>{{ u.role }}</td>
    <td>
      {% if u.id != session.user.id %}
      <form method="post" action="/users/{{ u.id }}/delete" class="d-inline" onsubmit="return confirm('삭제?')">
        <button class="btn btn-outline-danger btn-sm py-0">삭제</button>
      </form>
      {% endif %}
    </td>
  </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
